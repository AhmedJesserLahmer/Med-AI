name: NDCG regression check

on:
  push:
    branches: [master, main]
    paths:
      - "backend/**"
      - "data/**"
      - ".github/workflows/ndcg-eval.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "backend/**"
      - "data/**"
  workflow_dispatch: {}

jobs:
  ndcg-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip + HuggingFace model downloads
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
          key: ${{ runner.os }}-ndcg-eval-${{ hashFiles('backend/requirements.txt') }}

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Check PINECONE_API_KEY secret is configured
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: |
          if [ -z "$PINECONE_API_KEY" ]; then
            echo "::error::PINECONE_API_KEY repository secret is not set. Add it under Settings > Secrets and variables > Actions using the same value as your local .env, pointing at the Pinecone index backend/ingest.py populated. See README.md#ci for details."
            exit 1
          fi

      - name: Run NDCG regression check
        env:
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
        run: python backend/check_eval.py
